*{margin:0;padding:0;box-sizing:border-box}
#stage{width:600px;height:200px;display:flex;align-items:center;justify-content:center;gap:20px;
 background:radial-gradient(120% 140% at 85% 0%,rgba(201,168,76,.18),transparent 55%),linear-gradient(150deg,#0F2235,#1A3A5C);}
#mark{width:94px;height:94px;border-radius:23px;position:relative;overflow:hidden;flex:none;
 background:linear-gradient(150deg,#E4C566,#C9A84C 55%,#a9842f);
 box-shadow:0 10px 26px rgba(201,168,76,.4);transform-origin:center;}
#mark .house{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#mark .house svg{width:54px;height:54px}
#mark .shine{position:absolute;top:-60px;left:0;width:34px;height:220px;transform:rotate(20deg);
 background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent);filter:blur(2px)}
#txt{display:flex;flex-direction:column;justify-content:center}
#word{font-family:"DMSerif",serif;font-size:48px;line-height:1;white-space:nowrap}
#word .n{color:#fff}
#word .c{background:linear-gradient(105deg,#C9A84C 38%,#fff7e0 50%,#C9A84C 62%);background-size:260% 100%;
 -webkit-background-clip:text;background-clip:text;color:transparent}
#tag{font-family:"Heebo",sans-serif;font-weight:700;font-size:15px;color:#cdb874;margin-top:10px;
 letter-spacing:.5px;direction:rtl;text-align:right}
</style></head><body>
<div id="stage">
 <div id="mark">
   <div class="house"><svg viewBox="0 0 24 24" fill="none"><path d="M3 11.5 12 4l9 7.5" stroke="#0F2235" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v9h5v-5h4v5h5v-9" stroke="#0F2235" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
   <div class="shine" id="shine"></div>
 </div>
 <div id="txt">
   <div id="word"><span class="n">Nadlan</span><span class="c" id="connect">Connect</span></div>
   <div id="tag">פלטפורמת הנדל״ן הישראלית</div>
 </div>
</div>
<script>
const mark=document.getElementById('mark'),shine=document.getElementById('shine'),connect=document.getElementById('connect');
window.setFrame=(t)=>{
 const s=Math.min(1,t/0.6);                       // sweep 0..1 then pause
 mark.style.transform='scale('+(1+0.05*Math.sin(t*2*Math.PI))+')';
 shine.style.left=(-50+s*170)+'px';               // gold badge shine sweep
 connect.style.backgroundPositionX=(135-s*180)+'%'; // text shimmer sweep
};
window.setFrame(0);
</script></body></html>
