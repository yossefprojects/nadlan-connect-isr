:root{--navy:#0F2235;--blue:#1A3A5C;--gold:#C9A84C;--gold-soft:#E8D49A;--bg:#F8F7F4;--ink:#1d2733;--muted:#5a6675;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#c9ccd1}
body{font-family:"Heebo",sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:22px;}
.page{width:210mm;height:297mm;background:var(--bg);position:relative;overflow:hidden;
  box-shadow:0 24px 60px rgba(15,34,53,.28);display:flex;flex-direction:column;}
@page{size:A4;margin:0}
@media print{body{padding:0;background:#fff}.page{box-shadow:none}}
.serif{font-family:"FrankRuhl","Heebo",serif}

/* HEADER */
.hero{background:radial-gradient(120% 130% at 90% -10%, rgba(201,168,76,.20), transparent 55%),
  linear-gradient(160deg,var(--navy) 0%, var(--blue) 100%);color:#fff;padding:30px 44px 30px;position:relative;text-align:center;}
.hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:6px;
  background:linear-gradient(90deg,var(--gold),var(--gold-soft),var(--gold));}
.brand{display:flex;align-items:center;justify-content:center;gap:14px}
.logo-mark{width:54px;height:54px;border-radius:14px;background:linear-gradient(150deg,var(--gold),#a9842f);
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(201,168,76,.35);flex:none;}
.logo-mark svg{width:31px;height:31px}
.brand-name{font-family:"DMSerif",serif;font-size:34px;letter-spacing:.3px;line-height:1;direction:ltr}
.brand-name b{color:var(--gold)}
.brand-sub{font-size:14px;color:#bcd0e4;margin-top:14px;font-weight:700;letter-spacing:.5px}

/* MAIN — QR centerpiece */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:26px 44px;position:relative;overflow:hidden;}
.eyebrow{display:inline-block;font-size:13px;font-weight:700;letter-spacing:4px;color:#b9962f;text-transform:uppercase;}
h1{font-weight:700;font-size:46px;line-height:1.1;color:var(--navy);margin-top:8px;}
h1 .hl{color:var(--gold)}
.subhead{margin-top:12px;font-weight:700;font-size:27px;line-height:1.25;color:var(--navy);max-width:24ch;}
.subhead .em{color:#b9962f}
.pitch{margin-top:16px;display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#fff7e1,#fdecbf);
  border:2px solid var(--gold);border-radius:16px;padding:14px 26px;color:var(--navy);font-weight:700;
  font-size:21px;line-height:1.35;max-width:48ch;box-shadow:0 10px 24px rgba(201,168,76,.18);}
.pitch .em{color:#b9962f}
.pitch svg{width:26px;height:26px;flex:none}
.sub{margin-top:11px;font-size:15.5px;line-height:1.5;color:var(--muted);font-weight:400;max-width:46ch;}

.reno{margin-top:10px;display:flex;justify-content:center;position:relative;z-index:1}
.reno svg{height:66px;width:auto;display:block}
.qr-frame{margin-top:12px;position:relative;z-index:1;background:#fff;border:7px solid var(--gold);border-radius:30px;
  padding:18px;box-shadow:0 26px 60px rgba(15,34,53,.30);}
.qr-frame svg{width:338px;height:338px;display:block}
.scan-badge{margin-top:16px;position:relative;z-index:1;display:inline-flex;align-items:center;gap:11px;background:var(--navy);color:#fff;
  font-weight:700;font-size:20px;padding:13px 28px;border-radius:999px;box-shadow:0 10px 24px rgba(15,34,53,.3);}
.scan-badge svg{width:25px;height:25px}
.scan-sub{margin-top:10px;position:relative;z-index:1;font-size:14px;color:var(--muted);font-weight:600}

/* realistic cityscape background behind the QR */
.cityscape{position:absolute;left:0;right:0;bottom:0;height:440px;opacity:.20;pointer-events:none;z-index:0}
.cityscape svg{width:100%;height:100%;display:block}

/* FOOTER */
.foot{background:linear-gradient(150deg,var(--navy),var(--blue));color:#fff;position:relative;overflow:hidden;
  padding:38px 44px 22px;display:flex;align-items:center;justify-content:center;gap:18px;}
.foot-skyline{position:absolute;inset:0;opacity:.6;pointer-events:none}
.foot-skyline svg{width:100%;height:100%;display:block}
.url{direction:ltr;position:relative;z-index:1;display:inline-flex;align-items:center;gap:11px;background:var(--gold);color:var(--navy);
  font-weight:700;font-size:24px;padding:13px 28px;border-radius:999px;box-shadow:0 8px 20px rgba(15,34,53,.35);}
.url svg{width:24px;height:24px}
.foot-meta{text-align:left;font-size:13px;color:#bcd0e4;font-weight:700;line-height:1.7}
</style>
</head>
