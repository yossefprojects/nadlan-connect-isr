openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NadlanConnect API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Users
    description: User profile and role management.
  - name: Listings
    description: Real estate listings CRUD and search.
  - name: Mandates
    description: Agent mandate applications on developer projects.
  - name: Leads
    description: Buyer-to-pro lead management.
  - name: Favorites
    description: Buyer favorites.
  - name: Messages
    description: In-lead messaging.
  - name: Dashboard
    description: Pro and admin dashboard stats.
  - name: AI
    description: AI-powered property analysis (Anthropic Claude).
  - name: Demolition
    description: Tama 38 / Pinui-Binui marketplace — owners list buildings, promoters submit offers.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /auth/login:
    post:
      tags: [Auth]
      operationId: loginWithPassword
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerWithPassword
      summary: Create a buyer account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Account created and authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutSession
      summary: Clear the current session
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResult'

  # ── Storage ───────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object from storage
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ── Users ─────────────────────────────────────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      operationId: getMyProfile
      summary: Get the current user's profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Users]
      operationId: updateMyProfile
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/me/role:
    patch:
      tags: [Users]
      operationId: setMyRole
      summary: Set the current user's role (one-time selection)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleSelection'
      responses:
        '200':
          description: Role set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List all users (admin only)
      parameters:
        - name: role
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProfile'

  /users/{userId}:
    patch:
      tags: [Users]
      operationId: adminUpdateUser
      summary: Admin update a user (role, status)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  # ── Registration (B2B onboarding) ──────────────────────────────────────────
  /profiles/promoteur:
    post:
      tags: [Profiles]
      operationId: registerPromoteur
      summary: Register a promoteur (developer) onboarding application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteurRegistrationInput'
      responses:
        '201':
          description: Profile created (pending verification)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileRegistrationResult'
        '400':
          description: Invalid input or CGU not accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: A profile already exists with this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /profiles/agence:
    post:
      tags: [Profiles]
      operationId: registerAgence
      summary: Register an agence (agent) onboarding application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgenceRegistrationInput'
      responses:
        '201':
          description: Profile created (pending verification)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileRegistrationResult'
        '400':
          description: Invalid input or CGU not accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: A profile already exists with this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /admin/profiles:
    get:
      tags: [Profiles]
      operationId: adminListProfiles
      summary: List B2B onboarding profiles (admin only)
      parameters:
        - in: query
          name: role
          required: false
          schema:
            type: string
            enum: [developer, agent, introducer]
      responses:
        '200':
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileSummary'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /admin/profiles/{profileId}/licence:
    patch:
      tags: [Profiles]
      operationId: adminUpdateLicenceStatut
      summary: Update a profile's Risha'yon license verification status (admin only)
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLicenceStatutInput'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSummary'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden (not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ── Listings ──────────────────────────────────────────────────────────────
  /listings:
    get:
      tags: [Listings]
      operationId: listListings
      summary: Search and filter listings
      parameters:
        - name: ville
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          schema:
            type: integer
        - name: maxPrice
          in: query
          required: false
          schema:
            type: integer
        - name: minSurface
          in: query
          required: false
          schema:
            type: integer
        - name: maxSurface
          in: query
          required: false
          schema:
            type: integer
        - name: nbPieces
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: ownerId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List of listings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingsPage'
    post:
      tags: [Listings]
      operationId: createListing
      summary: Create a new listing (agent or developer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingInput'
      responses:
        '201':
          description: Created listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /listings/featured:
    get:
      tags: [Listings]
      operationId: getFeaturedListings
      summary: Get featured published listings for the homepage
      responses:
        '200':
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Listing'

  /listings/stats:
    get:
      tags: [Listings]
      operationId: getListingsStats
      summary: Aggregated stats - counts by city, type, avg price
      responses:
        '200':
          description: Listings statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingsStats'

  /listings/{listingId}:
    get:
      tags: [Listings]
      operationId: getListing
      summary: Get a single listing with images
      parameters:
        - name: listingId
          in: path
          required: true
          description: Listing slug (preferred) or numeric id (legacy).
          schema:
            type: string
      responses:
        '200':
          description: Listing detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingDetail'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Listings]
      operationId: updateListing
      summary: Update a listing (owner only)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingUpdate'
      responses:
        '200':
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
    delete:
      tags: [Listings]
      operationId: deleteListing
      summary: Delete a listing (owner or admin)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'

  /listings/{listingId}/images:
    post:
      tags: [Listings]
      operationId: addListingImage
      summary: Add an image to a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingImageInput'
      responses:
        '201':
          description: Image added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingImage'

  /listings/{listingId}/images/order:
    patch:
      tags: [Listings]
      operationId: reorderListingImages
      summary: Reorder a listing's images (first id becomes the cover)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderImagesInput'
      responses:
        '200':
          description: Images reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListingImage'

  /listings/{listingId}/images/{imageId}:
    delete:
      tags: [Listings]
      operationId: deleteListingImage
      summary: Remove an image from a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'

  /listings/{listingId}/publish:
    post:
      tags: [Listings]
      operationId: publishListing
      summary: Publish a draft listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Published listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'

  /listings/{listingId}/unpublish:
    post:
      tags: [Listings]
      operationId: unpublishListing
      summary: Move a listing back to draft (owner or admin)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Listing moved back to draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'

  # ── Programmes (developer projects grouping units) ────────────────────────
  /programs:
    get:
      tags: [Programs]
      operationId: listPrograms
      summary: List programmes (published, or filtered by owner)
      parameters:
        - name: ownerId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of programmes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Program'
    post:
      tags: [Programs]
      operationId: createProgram
      summary: Create a new programme (developer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramInput'
      responses:
        '201':
          description: Created programme
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /programs/{programId}:
    get:
      tags: [Programs]
      operationId: getProgram
      summary: Get a programme with its projets and documents
      parameters:
        - name: programId
          in: path
          required: true
          description: Programme slug (preferred) or numeric id (legacy).
          schema:
            type: string
      responses:
        '200':
          description: Programme detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramDetail'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Programs]
      operationId: updateProgram
      summary: Update a programme (owner or admin)
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramUpdate'
      responses:
        '200':
          description: Updated programme
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
    delete:
      tags: [Programs]
      operationId: deleteProgram
      summary: Delete a programme (owner or admin)
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'

  /programs/{programId}/publish:
    post:
      tags: [Programs]
      operationId: publishProgram
      summary: Publish a draft programme
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Published programme
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'

  /programs/{programId}/documents:
    get:
      tags: [Documents]
      operationId: listProgramDocuments
      summary: List documents attached to a programme (private ones owner/admin only)
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
    post:
      tags: [Documents]
      operationId: addProgramDocument
      summary: Attach a document (photo/plan/authorization) to a programme
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentInput'
      responses:
        '201':
          description: Document attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'

  /listings/{listingId}/documents:
    get:
      tags: [Documents]
      operationId: listListingDocuments
      summary: List documents attached to a projet (private ones owner/admin only)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
    post:
      tags: [Documents]
      operationId: addListingDocument
      summary: Attach a document (photo/plan/authorization) to a projet
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentInput'
      responses:
        '201':
          description: Document attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'

  /documents/{documentId}:
    delete:
      tags: [Documents]
      operationId: deleteDocument
      summary: Delete a document (owner or admin)
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'

  # ── Favorites ─────────────────────────────────────────────────────────────
  /favorites:
    get:
      tags: [Favorites]
      operationId: getMyFavorites
      summary: Get the current user's favorite listings
      responses:
        '200':
          description: Favorite listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Listing'

  /favorites/{listingId}:
    post:
      tags: [Favorites]
      operationId: addFavorite
      summary: Add a listing to favorites
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Added to favorites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favorite'
    delete:
      tags: [Favorites]
      operationId: removeFavorite
      summary: Remove a listing from favorites
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'

  # ── Mandates ──────────────────────────────────────────────────────────────
  /listings/{listingId}/mandates:
    post:
      tags: [Mandates]
      operationId: applyForMandate
      summary: Agent applies to resell a developer listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MandateInput'
      responses:
        '201':
          description: Mandate application created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandate'
    get:
      tags: [Mandates]
      operationId: listMandatesForListing
      summary: Developer views mandate applications for their listing
      parameters:
        - name: listingId
