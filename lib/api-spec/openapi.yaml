        status:
          type: string
          enum: [approved, rejected]

    # ── Leads ──
    Lead:
      type: object
      required: [id, listingId, buyerId, message, status, createdAt]
      properties:
        id:
          type: integer
        listingId:
          type: integer
        listingSlug:
          type: [string, 'null']
        listingTitle:
          type: [string, 'null']
        buyerId:
          type: string
        buyerName:
          type: [string, 'null']
        buyerEmail:
          type: [string, 'null']
        message:
          type: string
        status:
          type: string
          enum: [new, contacted, closed]
        createdAt:
          type: string
          format: date-time
    LeadDetail:
      type: object
      required: [lead, messages]
      properties:
        lead:
          $ref: '#/components/schemas/Lead'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    LeadInput:
      type: object
      required: [listingId, message]
      properties:
        listingId:
          type: integer
        message:
          type: string
          minLength: 1
    LeadStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, contacted, closed]

    # ── Messages ──
    Message:
      type: object
      required: [id, leadId, senderId, body, createdAt]
      properties:
        id:
          type: integer
        leadId:
          type: integer
        senderId:
          type: string
        senderName:
          type: [string, 'null']
        senderAvatar:
          type: [string, 'null']
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    MessageInput:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1

    # ── Dashboard ──
    DashboardStats:
      type: object
      required: [totalListings, publishedListings, draftListings, totalLeads, newLeads, contactedLeads, closedLeads]
      properties:
        totalListings:
          type: integer
        publishedListings:
          type: integer
        draftListings:
          type: integer
        totalLeads:
          type: integer
        newLeads:
          type: integer
        contactedLeads:
          type: integer
        closedLeads:
          type: integer
    AdminStats:
      type: object
      required: [totalUsers, totalListings, totalLeads, usersByRole, listingsByStatus]
      properties:
        totalUsers:
          type: integer
        totalListings:
          type: integer
        totalLeads:
          type: integer
        usersByRole:
          type: array
          items:
            $ref: '#/components/schemas/RoleCount'
        listingsByStatus:
          type: array
          items:
            $ref: '#/components/schemas/StatusCount'
    RoleCount:
      type: object
      required: [role, count]
      properties:
        role:
          type: string
        count:
          type: integer
    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    # ── Shared ──
    DeleteSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    # ── Demolition (Tama 38 / Pinui-Binui) marketplace ──
    DemolitionDocumentInput:
      type: object
      required: [url, name]
      properties:
        url:
          type: string
        name:
          type: string
        position:
          type: integer
          default: 0
    DemolitionDocument:
      type: object
      required: [id, listingId, url, name, position]
      properties:
        id:
          type: integer
        listingId:
          type: integer
        url:
          type: string
        name:
          type: string
        position:
          type: integer
    DemolitionListingInput:
      type: object
      required: [address, city, units, buildYear, projectType, ownerName, ownerEmail, ownerPhone]
      properties:
        address:
          type: string
          minLength: 1
          maxLength: 300
        city:
          type: string
          minLength: 1
          maxLength: 120
        neighborhood:
          type: [string, 'null']
          maxLength: 120
          description: General quarter shown publicly (e.g. "Florentin")
        units:
          type: integer
          minimum: 1
        buildYear:
          type: integer
          minimum: 1850
          maximum: 2100
        projectType:
          type: string
          enum: [tama38, pinui_binui, both]
        ownerName:
          type: string
          minLength: 1
          maxLength: 200
        ownerEmail:
          type: string
          minLength: 3
          maxLength: 320
        ownerPhone:
          type: string
          minLength: 1
          maxLength: 60
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DemolitionDocumentInput'
    DemolitionListing:
      type: object
      required:
        - id
        - city
        - units
        - buildYear
        - projectType
        - status
        - isPaid
        - offerCount
        - isAddressRevealed
        - isOwner
        - approxRadiusM
        - createdAt
      properties:
        id:
          type: integer
        # PRIVATE — present (non-null) only when the address is revealed to the
        # requester (owner, admin, or a validated promoter). Otherwise null.
        address:
          type: [string, 'null']
        city:
          type: string
        neighborhood:
          type: [string, 'null']
        # Exact coordinates — present only when isAddressRevealed is true.
        lat:
          type: [number, 'null']
        lng:
          type: [number, 'null']
        # Fuzzed approximate center for the public map circle (never the exact point).
        approxLat:
          type: [number, 'null']
        approxLng:
          type: [number, 'null']
        approxRadiusM:
          type: integer
          description: Radius (meters) of the approximate-location circle.
        isAddressRevealed:
          type: boolean
          description: Whether the requester may see the exact address & coordinates.
        isOwner:
          type: boolean
          description: Whether the authenticated requester is the listing owner.
        units:
          type: integer
        buildYear:
          type: integer
        projectType:
          type: string
          enum: [tama38, pinui_binui, both]
        # PRIVATE — owner identity, present only when the address is revealed.
        ownerName:
          type: [string, 'null']
        ownerEmail:
          type: [string, 'null']
        ownerPhone:
          type: [string, 'null']
        status:
          type: string
          enum: [pending, active, closed]
        isPaid:
          type: boolean
        offerCount:
          type: integer
        createdAt:
          type: string
          format: date-time
    DemolitionListingDetail:
      type: object
      required: [listing, documents]
      properties:
        listing:
          $ref: '#/components/schemas/DemolitionListing'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DemolitionDocument'
    DemolitionStanding:
      type: string
      enum: [standard, high_end, luxury]
    DemolitionOfferInput:
      type: object
      required:
        - pricePerUnit
        - newUnitArea
        - newUnitsOffer
        - estimatedDeliveredValue
        - standing
        - floors
        - parkingPerUnit
        - constructionDurationMonths
        - startDelayMonths
      properties:
        # --- Financial ---
        pricePerUnit:
          type: integer
          minimum: 0
          description: NIS offered per current apartment
        newUnitArea:
          type: integer
          minimum: 0
          description: Surface (m²) of the new apartment offered
        newUnitsOffer:
          type: integer
          minimum: 0
          description: Extra apartments offered to owners
        estimatedDeliveredValue:
          type: integer
          minimum: 0
          description: Estimated NIS value of the delivered apartment
        # --- Qualitative ---
        standing:
          $ref: '#/components/schemas/DemolitionStanding'
        materials:
          type: [string, 'null']
          maxLength: 2000
        floors:
          type: integer
          minimum: 0
        parkingPerUnit:
          type: integer
          minimum: 0
        elevator:
          type: boolean
        bikeStorage:
          type: boolean
        gym:
          type: boolean
        lobby:
          type: boolean
        replacementHousing:
          type: boolean
        replacementHousingQuality:
          type: [string, 'null']
          maxLength: 1000
        # --- Timeline & security ---
        constructionDurationMonths:
          type: integer
          minimum: 0
        startDelayMonths:
          type: integer
          minimum: 0
        bankGuarantee:
          type: boolean
        projectReferences:
          type: [string, 'null']
          maxLength: 2000
        message:
          type: [string, 'null']
          maxLength: 4000
    DemolitionOffer:
      type: object
      required:
        - id
        - listingId
        - promoterId
        - pricePerUnit
        - newUnitArea
        - newUnitsOffer
        - estimatedDeliveredValue
        - standing
        - floors
        - parkingPerUnit
        - elevator
        - bikeStorage
        - gym
        - lobby
        - replacementHousing
        - constructionDurationMonths
        - startDelayMonths
        - bankGuarantee
        - createdAt
      properties:
        id:
          type: integer
        listingId:
          type: integer
        promoterId:
          type: string
        promoterName:
          type: [string, 'null']
        promoterEmail:
          type: [string, 'null']
        promoterCompany:
          type: [string, 'null']
        # --- Financial ---
        pricePerUnit:
          type: integer
        newUnitArea:
          type: integer
        newUnitsOffer:
          type: integer
        estimatedDeliveredValue:
          type: integer
        # --- Qualitative ---
        standing:
          $ref: '#/components/schemas/DemolitionStanding'
        materials:
          type: [string, 'null']
        floors:
          type: integer
        parkingPerUnit:
          type: integer
        elevator:
          type: boolean
        bikeStorage:
          type: boolean
        gym:
          type: boolean
        lobby:
          type: boolean
        replacementHousing:
          type: boolean
        replacementHousingQuality:
          type: [string, 'null']
        # --- Timeline & security ---
        constructionDurationMonths:
          type: integer
        startDelayMonths:
          type: integer
        bankGuarantee:
          type: boolean
        projectReferences:
          type: [string, 'null']
        message:
          type: [string, 'null']
        # --- Computed comparison score (0-100), present only on list responses ---
        score:
          type: [integer, 'null']
        scoreFinancial:
          type: [integer, 'null']
        scoreQuality:
          type: [integer, 'null']
        scoreTimeline:
          type: [integer, 'null']
        scoreReferences:
          type: [integer, 'null']
        # Connection status of this promoter for the listing (owner/admin view):
        # null = none, 'requested', 'validated', 'rejected'.
        connectionStatus:
          type: [string, 'null']
          enum: [requested, validated, rejected, null]
        createdAt:
          type: string
          format: date-time
    DemolitionConnection:
      type: object
      required: [id, listingId, promoterId, status, commissionStatus, createdAt]
      properties:
        id:
          type: integer
        listingId:
          type: integer
        promoterId:
          type: string
        offerId:
          type: [integer, 'null']
        status:
          type: string
          enum: [requested, validated, rejected]
        commissionStatus:
          type: string
          enum: [none, due, paid]
        validatedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
        # Enriched context (populated where available for owner/admin views).
        promoterName:
          type: [string, 'null']
        promoterEmail:
          type: [string, 'null']
        promoterCompany:
          type: [string, 'null']
        listingCity:
          type: [string, 'null']
        listingNeighborhood:
          type: [string, 'null']
        listingAddress:
          type: [string, 'null']
        ownerName:
          type: [string, 'null']
    CreateDemolitionConnectionInput:
      type: object
      required: [offerId]
      properties:
        offerId:
          type: integer
          description: The offer (and thus promoter) the owner chooses to connect with.
    DemolitionConnectionStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [validated, rejected]
    DemolitionStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, active, closed]
        isPaid:
          type: boolean

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
