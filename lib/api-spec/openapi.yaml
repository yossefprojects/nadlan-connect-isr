components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── AI property analysis ──
    AnalyzePropertyInput:
      type: object
      required: [listingText]
      properties:
        listingText:
          type: string
          minLength: 10
          maxLength: 8000
          description: Raw real-estate listing text (e.g. copied from Yad2 or Madlan).
        language:
          type: string
          enum: [fr, en, he]
          default: fr
          description: Language for the AI-generated free-text fields (summary, comments, recommendation).
    PropertyFeatures:
      type: object
      required: [surface, rooms, floor, hasMamad, hasElevator, hasParking, city, neighborhood]
      properties:
        surface:
          type: [number, 'null']
          description: Surface in m².
        rooms:
          type: [number, 'null']
        floor:
          type: [string, 'null']
        hasMamad:
          type: [boolean, 'null']
        hasElevator:
          type: [boolean, 'null']
        hasParking:
          type: [boolean, 'null']
        city:
          type: [string, 'null']
        neighborhood:
          type: [string, 'null']
    PropertyAnomaly:
      type: object
      required: [label, severity, detail]
      properties:
        label:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        detail:
          type: string
    MarketEstimate:
      type: object
      required: [pricePerSqm, estimatedValue, listedPrice, verdict, comment]
      properties:
        pricePerSqm:
          type: [number, 'null']
          description: Estimated market price per m² in ₪.
        estimatedValue:
          type: [number, 'null']
          description: Estimated fair market value in ₪.
        listedPrice:
          type: [number, 'null']
          description: Listed price detected in the text, in ₪.
        verdict:
          type: string
          enum: [underpriced, fair, overpriced, unknown]
        comment:
          type: string
    RentalYield:
      type: object
      required: [estimatedMonthlyRent, grossYieldPct, netYieldPct, comment]
      properties:
        estimatedMonthlyRent:
          type: [number, 'null']
          description: Estimated monthly rent in ₪.
        grossYieldPct:
          type: [number, 'null']
        netYieldPct:
          type: [number, 'null']
        comment:
          type: string
    RenovationEstimate:
      type: object
      required: [level, estimatedBudget, comment]
      properties:
        level:
          type: string
          enum: [none, refresh, renovation, unknown]
        estimatedBudget:
          type: [number, 'null']
          description: Estimated renovation budget in ₪.
        comment:
          type: string
    UrbanPotential:
      type: object
      required: [tama38, pinouiBinoui, comment]
      properties:
        tama38:
          type: string
          enum: [yes, no, possible, unknown]
        pinouiBinoui:
          type: string
          enum: [yes, no, possible, unknown]
        comment:
          type: string
    PromoterRoi:
      type: object
      description: Promoter/developer financial appraisal (development project ROI).
      required:
        - applicable
        - existingSurface
        - projectedSurface
        - acquisitionPrice
        - constructionCostPerSqm
        - estimatedConstructionCosts
        - estimatedRevenue
        - grossRoiPct
        - hasBuildingPermit
        - comment
      properties:
        applicable:
          type: boolean
          description: True when the property is a development/promotion opportunity (lot, building, renovation-to-resell). False for a simple resale apartment.
        existingSurface:
          type: [number, 'null']
          description: Existing built surface in m².
        projectedSurface:
          type: [number, 'null']
          description: Total projected habitable surface after development, in m².
        acquisitionPrice:
          type: [number, 'null']
          description: Acquisition price in ₪.
        constructionCostPerSqm:
          type: [number, 'null']
          description: Applied construction cost per m² in ₪ (18000 standard/high, 28000 only if ultra-premium).
        estimatedConstructionCosts:
          type: [number, 'null']
          description: Total estimated construction costs in ₪ (incl. excavated basement/parking at 15000 ₪/m²).
        estimatedRevenue:
          type: [number, 'null']
          description: Estimated sales revenue in ₪ (projected surface × neighborhood price/m²).
        grossRoiPct:
          type: [number, 'null']
          description: Gross ROI percentage = ((revenue - total cost) / total cost) × 100, total cost includes 15% fees/contingency.
        hasBuildingPermit:
          type: [boolean, 'null']
          description: Whether a building permit is already granted (valued positively — ~3 years saved).
        comment:
          type: string
    # ── Shamai (appraisal) extensions ──
    CoefficientRow:
      type: object
      required: [factor, coefficient, impact]
      properties:
        factor:
          type: string
          description: Adjustment factor name (e.g. "État du bien", "Étage", "Âge").
        coefficient:
          type: [number, 'null']
          description: Applied multiplier (e.g. 1.08).
        impact:
          type: string
          description: Human-readable impact on price/m² (e.g. "+3 360 ₪/m²").
    AppraisalBreakdown:
      type: object
      description: Shamai-style appraisal — value range and coefficient decomposition (comparative method).
      required: [estimatedValue, valueLow, valueHigh, pricePerSqm, marketPricePerSqm, method, coefficients]
      properties:
        estimatedValue:
          type: [number, 'null']
          description: Central estimated market value (vénale) in ₪.
        valueLow:
          type: [number, 'null']
          description: Low end of the value range in ₪.
        valueHigh:
          type: [number, 'null']
          description: High end of the value range in ₪.
        pricePerSqm:
          type: [number, 'null']
          description: Estimated price per m² for THIS property in ₪ (after coefficients).
        marketPricePerSqm:
          type: [number, 'null']
          description: Median neighborhood market price per m² in ₪ (Nadlan Gov reference).
        method:
          type: string
          description: Primary valuation method used (comparative / revenu / résiduelle / coût).
        coefficients:
          type: array
          items:
            $ref: '#/components/schemas/CoefficientRow'
    FiscalLine:
      type: object
      required: [amount, ratePct, note]
      properties:
        amount:
          type: [number, 'null']
          description: Tax amount in ₪.
        ratePct:
          type: [number, 'null']
          description: Effective rate in %.
        note:
          type: string
    FiscalAnalysis:
      type: object
      description: Israeli real-estate taxation (Mas Rechisha / Mas Shevach / Heitel Hashvacha).
      required: [masRechisha, masShevach, heitelHashvacha, acquisitionTotalCost, sellerNetProceeds, comment]
      properties:
        masRechisha:
          $ref: '#/components/schemas/FiscalLine'
        masShevach:
          $ref: '#/components/schemas/FiscalLine'
        heitelHashvacha:
          $ref: '#/components/schemas/FiscalLine'
        acquisitionTotalCost:
          type: [number, 'null']
          description: Total buyer acquisition cost (price + Mas Rechisha + ~1% fees) in ₪.
        sellerNetProceeds:
          type: [number, 'null']
          description: Estimated net proceeds for the seller after taxes in ₪.
        comment:
          type: string
    UrbanCriterion:
      type: object
      required: [label, status, valueImpact]
      properties:
        label:
          type: string
        status:
          type: string
          description: Status text (e.g. "Oui", "Non", "À vérifier").
        valueImpact:
          type: string
          description: Estimated value impact (e.g. "+15 à +25%").
    UrbanScore:
      type: object
      description: Urban-renewal potential score (0-100) with criteria breakdown.
      required: [score, criteria, comment]
      properties:
        score:
          type: [integer, 'null']
          minimum: 0
          maximum: 100
        criteria:
          type: array
          items:
            $ref: '#/components/schemas/UrbanCriterion'
        comment:
          type: string

