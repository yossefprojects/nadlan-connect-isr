kind = "web"
previewPath = "/"
title = "NadlanConnect"
version = "1.0.0"
id = "artifacts/nadlan-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24705

[services.development]
run = "pnpm --filter @workspace/nadlan-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nadlan-connect", "run", "build" ]
publicDir = "artifacts/nadlan-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24705"
BASE_PATH = "/"
